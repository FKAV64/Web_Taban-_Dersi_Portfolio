# ─────────────────────────────────────────────────────────────────────────────
#  nginx.conf — Production config for avfk-portfolio
#  Serves a fully-static Astro site with SRE-grade hygiene:
#    • Structured JSON access logs  → Docker log driver captures them natively
#    • /health probe                → used by Docker, Compose, and load balancers
#    • Graceful shutdown            → SIGQUIT + worker_shutdown_timeout
#    • Aggressive asset caching     → Astro content-hashes _astro/* files
#    • Security hardening headers   → no version leaks, framing, MIME-sniff
# ─────────────────────────────────────────────────────────────────────────────

# Auto-size workers to available vCPU count.
worker_processes auto;

# Raise the open-file limit so workers can handle many concurrent connections
# without hitting the OS default of 1024.
worker_rlimit_nofile 65535;

# On SIGQUIT, give workers up to 30 s to finish in-flight requests before
# nginx terminates them.  This is the core of graceful shutdown.
worker_shutdown_timeout 30s;

events {
    worker_connections  1024;
    use                 epoll;      # Linux-optimised I/O event model
    multi_accept        on;         # accept all pending connections at once
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Structured JSON access logging ────────────────────────────────────────
    # escape=json ensures that user-supplied strings (UA, referer, URI) cannot
    # break the JSON envelope — critical for downstream log parsers.
    log_format json_structured escape=json
        '{'
            '"ts":"$time_iso8601",'
            '"method":"$request_method",'
            '"uri":"$uri",'
            '"query":"$query_string",'
            '"status":$status,'
            '"bytes_sent":$bytes_sent,'
            '"body_bytes":$body_bytes_sent,'
            '"req_time_s":$request_time,'
            '"remote":"$remote_addr",'
            '"x_forwarded_for":"$http_x_forwarded_for",'
            '"referer":"$http_referer",'
            '"user_agent":"$http_user_agent",'
            '"host":"$http_host"'
        '}';

    # Write to /dev/stdout — the Docker daemon captures it via the log driver.
    # The official nginx:alpine image symlinks /var/log/nginx/* → /dev/std*,
    # but being explicit here makes the intent clear and survives config edits.
    access_log  /dev/stdout  json_structured;
    error_log   /dev/stderr  warn;

    # ── Performance tuning ────────────────────────────────────────────────────
    sendfile            on;
    tcp_nopush          on;     # batch response headers + early body in one packet
    tcp_nodelay         on;     # disable Nagle after keep-alive resumes
    keepalive_timeout   65;
    keepalive_requests  1000;
    types_hash_max_size 2048;
    server_tokens       off;    # suppress "nginx/x.y.z" from Server header

    # ── Gzip compression ──────────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_min_length   256;
    # text/html is always gzip-eligible by default; listing it here would
    # trigger a "duplicate MIME type" warning, so it is intentionally omitted.
    gzip_types
        application/javascript
        application/json
        application/xml
        image/svg+xml
        text/css
        text/plain
        text/xml;

    # ─────────────────────────────────────────────────────────────────────────
    server {
        listen       80;
        server_name  _;

        root   /usr/share/nginx/html;
        index  index.html;

        # ── Security response headers ─────────────────────────────────────────
        # NOTE: nginx's add_header is NOT inherited by child location blocks
        # that define their own add_header.  Locations below intentionally avoid
        # add_header so these propagate everywhere automatically.
        add_header X-Frame-Options         "SAMEORIGIN"                      always;
        add_header X-Content-Type-Options  "nosniff"                         always;
        add_header X-XSS-Protection        "1; mode=block"                   always;
        add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy      "interest-cohort=()"              always;

        # ── /health — liveness / readiness probe ──────────────────────────────
        # Returns a 200 with a JSON body.  Used by:
        #   • Docker HEALTHCHECK in the Dockerfile
        #   • docker-compose healthcheck block
        #   • Any upstream load balancer or orchestrator
        location = /health {
            access_log   off;           # keep health-poll noise out of access log
            default_type application/json;
            return 200 '{"status":"ok","service":"avfk-portfolio","version":"1.0.0"}';
        }

        # ── Content-hashed Astro assets — cache for 1 year ───────────────────
        # Astro appends a content hash to every file under /_astro/ so the name
        # changes whenever the content changes.  It is safe to cache indefinitely.
        # Uses `expires` (not add_header) to avoid disrupting header inheritance.
        location ^~ /_astro/ {
            expires    1y;
            access_log off;
        }

        # ── Favicon / robots.txt — short cache, low log noise ─────────────────
        location ~* \.(ico|txt)$ {
            expires    7d;
            access_log off;
        }

        # ── HTML files — always revalidate ────────────────────────────────────
        # Prevents a stale index.html from serving old JS/CSS chunk references
        # after a deploy.
        location ~* \.html$ {
            expires -1;
        }

        # ── SPA / static fallback ─────────────────────────────────────────────
        # Astro generates fully-static HTML for every page, but the fallback
        # to index.html ensures single-file deployments still work.
        location / {
            try_files $uri $uri/ /index.html;
        }

        # ── Block hidden files (.env, .git, .DS_Store …) ─────────────────────
        location ~ /\. {
            deny           all;
            access_log     off;
            log_not_found  off;
        }
    }
}
