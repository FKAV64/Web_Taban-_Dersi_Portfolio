# ─────────────────────────────────────────────────────────────────────────────
#  deploy.yml — CI/CD pipeline for avfk-portfolio
#
#  Jobs (run in order, each gating the next):
#    1. security  — Gitleaks (secrets) + Semgrep (SAST) + Trivy FS scan
#    2. build     — Astro lint/type-check + Astro build + Docker image scan
#    3. push      — Build & push to GHCR (main branch only)
#
#  IMPORTANT (monorepo note):
#    GitHub Actions reads workflows only from the repository ROOT at
#    .github/workflows/.  If this portfolio lives inside a larger monorepo,
#    move this file to the repo root and add:
#      on:
#        push:
#          paths: ['10-week-10/Portfolio/**']
#    and set `context: 10-week-10/Portfolio` in every docker build step.
# ─────────────────────────────────────────────────────────────────────────────

name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Global read-only default; individual jobs escalate only what they need.
permissions:
  contents: read

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/avfk-portfolio

# ─── Job 1: DevSecOps Quality Gate ────────────────────────────────────────────
jobs:
  security:
    name: DevSecOps Quality Gate
    runs-on: ubuntu-latest
    permissions:
      contents:        read
      security-events: write   # upload SARIF → GitHub Security tab

    steps:
      - name: Checkout (full history — required by Gitleaks)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Secrets detection ──────────────────────────────────────────────────
      # Gitleaks scans the entire git history for leaked credentials, tokens,
      # and API keys.  Fails the job if any secret is found.
      - name: Gitleaks — detect secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── SAST ──────────────────────────────────────────────────────────────
      # Semgrep uses community rule packs — no account or token required.
      # --error exits non-zero on any finding; remove to make advisory-only.
      - name: Semgrep — static analysis
        run: |
          pip install semgrep --quiet
          semgrep \
            --config p/javascript \
            --config p/typescript \
            --config p/docker \
            --error \
            .

      # ── Dependency & IaC vulnerability scan ───────────────────────────────
      # Trivy scans package-lock.json, Dockerfile, and config files.
      # exit-code: 1  → pipeline FAILS if any CRITICAL vuln is found.
      # ignore-unfixed: true → skip vulns that have no patch yet.
      - name: Trivy — filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type:      fs
          scan-ref:       .
          severity:       CRITICAL
          exit-code:      '1'
          ignore-unfixed: true
          format:         sarif
          output:         trivy-fs.sarif

      - name: Upload Trivy FS results → GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()   # upload even when the previous step failed
        with:
          sarif_file: trivy-fs.sarif
          category:   trivy-filesystem

  # ─── Job 2: Lint / Build / Image Scan ───────────────────────────────────────
  build:
    name: Lint, Build & Image Scan
    runs-on: ubuntu-latest
    needs: security
    permissions:
      contents:        read
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      # ── Lint ────────────────────────────────────────────────────────────────
      # `astro check` runs the TypeScript compiler over all .astro, .ts, and
      # .tsx files.  Provided by the @astrojs/check devDependency.
      - name: Lint — Astro type-check
        run: npm run check

      # ── Build ───────────────────────────────────────────────────────────────
      - name: Build Astro site
        run: npm run build

      # ── Docker image build (local only — no push) ──────────────────────────
      # The GHA layer cache (type=gha) is written here so the push job can
      # reuse it without rebuilding from scratch.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (load into daemon, no push)
        uses: docker/build-push-action@v5
        with:
          context:    .
          push:       false
          load:       true
          tags:       avfk-portfolio:${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      # ── Container image vulnerability scan ────────────────────────────────
      # Scans the just-built image for OS-level and language CVEs.
      # Fails the job on any CRITICAL finding (same policy as FS scan).
      - name: Trivy — image scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref:      avfk-portfolio:${{ github.sha }}
          severity:       CRITICAL
          exit-code:      '1'
          ignore-unfixed: true
          format:         sarif
          output:         trivy-image.sarif

      - name: Upload Trivy image results → GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-image.sarif
          category:   trivy-image

  # ─── Job 3: Push to GHCR ────────────────────────────────────────────────────
  push:
    name: Push to GHCR
    runs-on: ubuntu-latest
    needs: build
    # Only runs on direct pushes to main — not on pull requests.
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write   # write to ghcr.io

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Generates two tags:
      #   ghcr.io/<owner>/avfk-portfolio:sha-<short-sha>
      #   ghcr.io/<owner>/avfk-portfolio:latest
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=true

      # The GHA layer cache written by the build job means this step reads
      # from cache rather than rebuilding — fast and deterministic.
      - name: Build & push to GHCR
        uses: docker/build-push-action@v5
        with:
          context:    .
          push:       true
          tags:       ${{ steps.meta.outputs.tags }}
          labels:     ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max
