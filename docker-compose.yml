name: avfk-portfolio

services:
  portfolio:
    build:
      context: .
      dockerfile: Dockerfile
    image: avfk-portfolio:latest
    container_name: avfk-portfolio
    restart: unless-stopped
    ports:
      - "8080:80"

    # ── Health probe ────────────────────────────────────────────────────────
    # Pings the /health endpoint defined in nginx.conf.
    # Docker marks the container "healthy" only after 3 consecutive successes.
    # The start_period gives nginx time to fully load before the probe counts.
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://127.0.0.1/health | grep -q '\"status\":\"ok\"' || exit 1",
        ]
      interval:     30s
      timeout:       5s
      retries:        3
      start_period: 10s

    # ── Resource limits ──────────────────────────────────────────────────────
    # A static nginx serving a portfolio needs almost nothing.
    # Caps prevent noisy-neighbour runaway consumption.
    deploy:
      resources:
        limits:
          cpus:   "0.50"
          memory: 64M
        reservations:
          cpus:   "0.05"
          memory: 16M

    # ── Hardened runtime ─────────────────────────────────────────────────────
    # read_only mounts the container's root filesystem read-only.
    # tmpfs entries provide the specific writable paths nginx actually needs:
    #   /var/cache/nginx  — proxy/fastcgi temp files
    #   /var/run          — nginx.pid
    #   /tmp              — miscellaneous temp
    read_only: true
    tmpfs:
      - /var/cache/nginx:mode=0755
      - /var/run:mode=0755
      - /tmp:mode=1777

    # Prevent the process from gaining new privileges via setuid binaries.
    security_opt:
      - no-new-privileges:true

    # Drop every Linux capability, then add back only what nginx needs:
    #   NET_BIND_SERVICE  — bind to port 80 (< 1024)
    #   SETUID / SETGID   — drop master-process UID to nginx worker user
    #   CHOWN             — set file ownership during startup
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
      - SETUID
      - SETGID
      - CHOWN

    # ── Log driver ────────────────────────────────────────────────────────────
    # nginx writes structured JSON lines to stdout; Docker captures them here.
    # Rotate at 10 MB, keep 3 files → max 30 MB of log on disk.
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

    labels:
      service:    avfk-portfolio
      maintainer: "Abdou Valerio Foma Kenfack"
      version:    "1.0.0"
